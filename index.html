<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNJEN NET | TESLA CORE v2</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid #00d4ff; border-radius: 40px; padding: 40px; text-align: center; width: 380px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.2); }
        h1 { font-size: 2.2em; color: #00d4ff; text-shadow: 0 0 15px #00d4ff; margin-bottom: 5px; letter-spacing: 3px; }
        p { opacity: 0.6; font-size: 0.8em; margin-bottom: 20px; }
        
        /* Tesla Dugme */
        .tesla-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00d4ff; background: none; color: #00d4ff; font-weight: bold; cursor: pointer; transition: 0.4s; margin: 0 auto; display: block; font-size: 1.1em; }
        .tesla-btn:hover { box-shadow: 0 0 30px #00d4ff; transform: scale(1.02); }
        .tesla-btn.active { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 40px #00ff88; }

        /* Login Sekcija */
        .auth-box { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        input { background: #111; border: 1px solid #333; color: #00d4ff; padding: 10px; border-radius: 10px; width: 80%; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff44; }

        /* Live Monitor (Skriven) */
        .monitor { display: none; margin-top: 25px; padding: 15px; background: rgba(0, 212, 255, 0.05); border-radius: 15px; border: 1px dashed #00d4ff; }
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-family: monospace; font-size: 1.1em; }
        .value { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>OGNJEN NET</h1>
    <p>POWERED BY GITHUB BACKBONE</p>

    <button class="tesla-btn" id="mainBtn" onclick="activateNet()">AKTIVIRAJ<br>PROTOKOL</button>

    <div class="auth-box" id="authSection">
        <input type="password" id="passInput" placeholder="Unesi Tesla Šifru..." oninput="checkPass()">
    </div>

    <div class="monitor" id="teslaMonitor">
        <div style="color: #ffcc00; font-size: 0.9em; margin-bottom: 10px;">⚡ GITHUB CLOUD LIVE ⚡</div>
        <div class="stat-row"><span>ALLOCATED:</span> <span class="value" id="alloc">0 GB</span></div>
        <div class="stat-row"><span>BANDWIDTH:</span> <span class="value" id="speed">0 Gbps</span></div>
        <div class="stat-row"><span>CORE LOAD:</span> <span class="value" id="load">0%</span></div>
    </div>
</div>

<script>
    function activateNet() {
        const btn = document.getElementById('mainBtn');
        btn.innerHTML = "TUNNELING...";
        setTimeout(() => {
            btn.innerHTML = "ONLINE";
            btn.classList.add('active');
        }, 1200);
    }

    function checkPass() {
        const val = document.getElementById('passInput').value;
        if(val === "ognjen tesla") {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('teslaMonitor').style.display = 'block';
            startLiveUpdates();
        }
    }

    function startLiveUpdates() {
        setInterval(() => {
            // Simulacija realnog vremena sa GitHub servera
            const randomAlloc = (Math.random() * (12.8 - 12.1) + 12.1).toFixed(1);
            const randomSpeed = (Math.random() * (15.2 - 14.5) + 14.5).toFixed(2);
            const randomLoad = Math.floor(Math.random() * (45 - 38) + 38);

            document.getElementById('alloc').innerText = randomAlloc + " GB";
            document.getElementById('speed').innerText = randomSpeed + " Gbps";
            document.getElementById('load').innerText = randomLoad + "%";
        }, 800);
    }
</script>

</body>
</html>
