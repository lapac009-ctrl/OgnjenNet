<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNJEN NET | TESLA VIRTUAL ISP</title>
    <style>
        /* Moderni Cyberpunk / Glassmorphism Dizajn */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a0a 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
            width: 350px;
        }

        h1 {
            font-size: 2.5em;
            letter-spacing: 5px;
            color: #00d4ff;
            margin-bottom: 5px;
            text-shadow: 0 0 15px #00d4ff;
        }

        p {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        /* Glavno Okruglo Tesla Dugme */
        .tesla-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.2), 0 0 20px rgba(0, 212, 255, 0.2);
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .tesla-button:hover {
            box-shadow: inset 0 0 40px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.5);
            transform: scale(1.05);
        }

        .tesla-button.active {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: inset 0 0 60px rgba(0, 255, 136, 0.6), 0 0 60px rgba(0, 255, 136, 0.6);
            text-shadow: 0 0 10px #00ff88;
        }

        .stats {
            margin-top: 30px;
            display: none;
        }

        .stat-item {
            font-size: 1.1em;
            margin: 5px 0;
            color: #00ffcc;
        }

        .loading-bar {
            width: 0%;
            height: 2px;
            background: #00d4ff;
            margin-top: 20px;
            transition: width 2s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OGNJEN NET</h1>
    <p>TESLA VIRTUAL INFRASTRUCTURE</p>

    <button class="tesla-button" id="mainBtn" onclick="activateNet()">
        START<br>TESLA CORE
    </button>

    <div class="loading-bar" id="loader"></div>

    <div class="stats" id="statsArea">
        <div class="stat-item" id="ping">PING: 1 ms</div>
        <div class="stat-item" id="speed">SPEED: 12.4 Gbps</div>
        <div class="stat-item" style="color: #00ff88;">STATUS: ONLINE</div>
    </div>
</div>

<script>
    function activateNet() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const stats = document.getElementById('statsArea');

        btn.innerHTML = "POVEZIVANJE...";
        loader.style.width = "100%";

        // Simulacija povezivanja na tvoj GitHub backend
        setTimeout(() => {
            btn.innerHTML = "TESLA NET<br>AKTIVAN";
            btn.classList.add('active');
            stats.style.display = "block";
            
            // Ovde JavaScript može da pokrene WebRTC zahtev 
            // koji optimizuje tvoju lokalnu IP putanju.
            console.log("Ognjen Net: Protokol aktiviran preko GitHub Pages.");
        }, 2500);
    }
</script>

</body>
</html>
