<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNJEN NET | ADMIN CONTROL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid #00d4ff; border-radius: 40px; padding: 40px; text-align: center; width: 350px; box-shadow: 0 0 30px #00d4ff44; }
        h1 { font-size: 2em; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .tesla-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00d4ff; background: none; color: #00d4ff; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 20px auto; display: block; }
        .tesla-btn.active { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 30px #00ff88; }
        .stats { margin-top: 20px; font-family: monospace; }
        .admin-box { margin-top: 20px; padding: 10px; border-top: 1px solid #333; display: none; }
        input { background: #111; border: 1px solid #00d4ff; color: #fff; padding: 5px; border-radius: 5px; width: 80%; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="showAdmin()">OGNJEN NET</h1>
    <p id="sub">VIRTUAL INFRASTRUCTURE</p>

    <button class="tesla-btn" id="mainBtn" onclick="activateNet()">START<br>TESLA CORE</button>

    <div class="stats" id="statsArea" style="display:none;">
        <div id="ping">PING: 1 ms</div>
        <div id="speed">SPEED: 12.4 Gbps</div>
        <div id="status" style="color:#00ff88">STATUS: ONLINE</div>
    </div>

    <div class="admin-box" id="adminPanel">
        <p style="color:#ffcc00">ADMIN MODE AKTIVAN</p>
        <input type="text" id="msgInput" placeholder="Pošalji poruku svima...">
        <button onclick="sendAlert()" style="margin-top:10px; cursor:pointer;">POŠALJI</button>
    </div>
</div>

<script>
    let clickCount = 0;
    function showAdmin() {
        clickCount++;
        if(clickCount >= 5) { // Klikni 5 puta na naslov "OGNJEN NET" da otvoriš Admin Panel
            document.getElementById('adminPanel').style.display = 'block';
            alert("ADMIN MODE OTKLJUČAN!");
        }
    }

    function activateNet() {
        const btn = document.getElementById('mainBtn');
        btn.innerHTML = "POVEZIVANJE...";
        setTimeout(() => {
            btn.innerHTML = "TESLA NET<br>AKTIVAN";
            btn.classList.add('active');
            document.getElementById('statsArea').style.display = 'block';
        }, 1500);
    }

    function sendAlert() {
        let msg = document.getElementById('msgInput').value;
        alert("SISTEMSKA PORUKA: " + msg);
    }
</script>
</body>
</html>
